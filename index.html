<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>andreiminzu.ro | Real Estate Media</title>

  <!-- Font Lato -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: url('screen.jpg') no-repeat center center/cover;
      color: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 720px;
      padding: 30px;
    }

    h1 {
      font-family: 'Lato', sans-serif;
      font-size: 44px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
      margin-bottom: 35px;
      line-height: 1.5;
    }

    .tag {
      font-size: 13px;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    /* BUTOANE PE DREAPTA */
    .buttons {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    a.button {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.25s ease;
      display: inline-block;
      min-width: 160px;
      text-align: left;
      backdrop-filter: blur(8px);
    }

    .primary {
      background: #ffffff;
      color: #000;
    }

    .primary:hover {
      background: #e6e6e6;
      transform: translateX(-3px);
    }

    .secondary {
      background: rgba(0,0,0,0.4);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .secondary:hover {
      background: rgba(0,0,0,0.6);
      transform: translateX(-3px);
    }

    footer {
      margin-top: 50px;
      font-size: 13px;
      line-height: 1.6;
    }

    /* RESPONSIVE (telefon) */
    @media (max-width: 768px) {
      .buttons {
        position: static;
        transform: none;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
      }

      a.button {
        min-width: auto;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="tag">andreiminzu.ro</div>

    <h1>We'll be back soon.</h1>

    <p>
      Website-ul este în construcție.<br>
      Pentru colaborări sau oferte, mă poți contacta direct.
    </p>

  </div>

  <div class="buttons">
    <a href="tel:+40746179883" class="button secondary">📞 Sună-mă</a>
    <a href="https://wa.me/40746179883" class="button secondary">💬 WhatsApp</a>
    <a href="https://instagram.com/andreiminzu/" target="_blank" class="button secondary">📸 Instagram</a>
    <a href="mailto:andrei.minzu@icloud.com?subject=Solicitare ofertă foto imobiliară&body=Salut, te contactez de pe site." class="button secondary">✉️ Email</a>
  </div>

</body>
</html>
