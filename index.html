<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>andreiminzu.ro | Real Estate Media</title>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      color: #ffffff;
      min-height: 100vh;
      background-image: url('screen.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: left center;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 10vh 8vw 6vh 8vw;
    }

    .content {
      width: min(520px, 100%);
      text-align: left;
      margin-right: 180px;
    }

    .tag {
      font-size: 13px;
      letter-spacing: 6px;
      margin-bottom: 28px;
      color: rgba(255,255,255,0.95);
    }

    h1 {
      font-family: 'Lato', sans-serif;
      font-size: clamp(48px, 6vw, 82px);
      line-height: 0.95;
      font-weight: 900;
      margin: 0 0 28px 0;
      max-width: 420px;
      text-wrap: balance;
    }

    p {
      font-size: 20px;
      line-height: 1.45;
      margin: 0;
      max-width: 420px;
      color: rgba(255,255,255,0.96);
    }

    .buttons {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
    }

    a.button {
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.2;
      display: inline-block;
      min-width: 210px;
      text-align: left;
      color: #fff;
      background: rgba(30,30,30,0.34);
      border: 1px solid rgba(255,255,255,0.28);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    a.button:hover {
      transform: translateX(-4px);
      background: rgba(20,20,20,0.5);
      border-color: rgba(255,255,255,0.42);
    }

    .primary {
      background: rgba(255,255,255,0.9);
      color: #111;
      border: 1px solid rgba(255,255,255,0.9);
    }

    .primary:hover {
      background: #ffffff;
    }

    footer {
      margin-top: 36px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
    }

    @media (max-width: 1200px) {
      .content {
        margin-right: 150px;
        width: min(460px, 100%);
      }

      a.button {
        min-width: 190px;
      }
    }

    @media (max-width: 900px) {
      body {
        background-position: 18% center;
      }

      .page {
        justify-content: center;
        padding: 8vh 5vw 5vh;
      }

      .content {
        margin-right: 0;
        width: min(520px, 100%);
        text-align: center;
      }

      h1,
      p {
        max-width: none;
      }

      .buttons {
        position: static;
        transform: none;
        flex-direction: column;
        width: min(340px, 100%);
        margin: 28px auto 0;
      }

      a.button {
        min-width: 0;
        width: 100%;
        text-align: center;
      }
    }

    @media (max-width: 768px) {
      body {
        background-size: cover;
        background-position: 12% center;
      }

      .page {
        align-items: flex-start;
        justify-content: center;
        padding: 9vh 20px 32px;
      }

      .content {
        width: 100%;
        max-width: 360px;
        text-align: left;
      }

      .tag {
        font-size: 11px;
        letter-spacing: 4px;
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(34px, 12vw, 56px);
        line-height: 0.98;
        margin-bottom: 20px;
        max-width: 250px;
      }

      p {
        font-size: 16px;
        line-height: 1.5;
        max-width: 250px;
      }

      .buttons {
        width: min(260px, 100%);
        margin: 26px 0 0 auto;
      }

      a.button {
        padding: 13px 16px;
        border-radius: 14px;
        font-size: 14px;
      }

      footer {
        margin-top: 24px;
        font-size: 12px;
        max-width: 250px;
      }
    }

    @media (max-width: 430px) {
      body {
        background-position: 10% center;
      }

      .page {
        padding-top: 8vh;
      }

      .content {
        max-width: 320px;
      }

      h1 {
        max-width: 220px;
      }

      p,
      footer {
        max-width: 220px;
      }

      .buttons {
        width: 240px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="content">
      <div class="tag">andreiminzu.ro</div>

      <h1>We'll be back soon.</h1>

      <p>
        Website-ul este în construcție.<br>
        Pentru colaborări sau oferte, mă poți contacta direct.
      </p>

      <footer>
        București • Ilfov<br>
        Foto • Video • Tururi Virtuale
      </footer>

      <div class="buttons">
        <a href="tel:+40746179883" class="button primary">📞 Sună-mă</a>
        <a href="https://wa.me/40746179883" class="button">💬 WhatsApp</a>
        <a href="https://instagram.com/andreiminzu/" target="_blank" class="button">📸 Instagram</a>
        <a href="mailto:andrei.minzu@icloud.com?subject=Solicitare ofertă foto imobiliară&body=Salut, te contactez de pe site." class="button">✉️ Email</a>
      </div>
    </div>
  </div>
</body>
</html>
