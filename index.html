<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>andreiminzu.ro</title>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      height: 100vh;
      background: url('screen.jpg') no-repeat center center/cover;
      position: relative;
      overflow: hidden;
    }

    /* TITLU */
    .hero {
      position: absolute;
      top: 6vh;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 90%;
    }

    .tag {
      letter-spacing: 6px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Lato', sans-serif;
      font-weight: 900;
      font-size: clamp(40px, 6vw, 80px);
      margin: 0;
    }

    /* TEXT */
    .info {
      position: absolute;
      top: 35vh;
      right: 18vw;
      width: 320px;
      font-size: 18px;
      line-height: 1.5;
    }

    /* BUTOANE */
    .buttons {
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .button {
      text-decoration: none;
      padding: 14px;
      border-radius: 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(8px);
      color: #fff;
      min-width: 180px;
    }

    .primary {
      background: #fff;
      color: #000;
    }

    /* FOOTER */
    .footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      text-align: center;
    }

    /* MOBILE */
    @media (max-width: 768px) {

      body {
        background-position: 35% center;
      }

      h1 {
        font-size: 42px;
      }

      .info {
        position: absolute;
        top: 34vh;
        left: 8vw;
        right: auto;
        width: 55%;
        font-size: 15px;
      }

      .buttons {
        right: 12px;
        top: 60%;
      }
    }

    @media (max-width: 430px) {

      body {
        background-position: 30% center;
      }

      .info {
        top: 38vh;
        width: 50%;
      }
    }

  </style>
</head>

<body>

  <div class="hero">
    <div class="tag">andreiminzu.ro</div>
    <h1>We'll be back soon.</h1>
  </div>

  <div class="info">
    Website-ul este în construcție.<br>
    Pentru colaborări sau oferte, mă poți contacta direct.
  </div>

  <div class="buttons">
    <a href="tel:+40746179883" class="button primary">📞 Sună-mă</a>
    <a href="https://wa.me/40746179883" class="button">💬 WhatsApp</a>
    <a href="https://instagram.com/andreiminzu/" target="_blank" class="button">📸 Instagram</a>
    <a href="mailto:andrei.minzu@icloud.com" class="button">✉️ Email</a>
  </div>

  <div class="footer">
    București • Ilfov &nbsp;&nbsp; Foto • Video • Tururi Virtuale
  </div>

</body>
</html>
